openapi: 3.0.3
info:
  title: Projeto BaratieFit - Lucas Dias Brandão Kolle
  description: API destinada a alimentar o catálogo de refeições do BaratieFit, fornecendo informações sobre as refeições disponíveis, suas características nutricionais e restrições alimentares.
  termsOfService: http://swagger.io/terms/
  version: 1.0.06.26
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
  - url: http://
