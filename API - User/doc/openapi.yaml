  /v1/baratie/tipo/refeicao:
    get:
      tags:
        - Tipo Refeição
      summary: Lista todos os Tipos de Refeição
      description: Listagem de todos os tipos de refeição cadastradas no banco de dados.
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Filme'          
           
        '404':
          description: Not Found
        '500':
          description: Erro Interno na API
  /v1/baratie/tipo/refeicao/{id}:
    get:
      tags:
        - Tipo Refeição
      summary: Busca um tipo de refeição pelo ID
      description: Retorna um tipo de refeição cadastrado no banco de dados, utilizando o ID para localizar o registro desejado.
      parameters:
        - name: id
          in: path
          description: Recebe o ID para localizar o tipo de refeição desejado
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Filme'          
        '400':
          description: Invalid ID supplied
        '404':
          description: Tipo de Refeição não encontrada
        '500':
          description: Erro Interno na API
  
