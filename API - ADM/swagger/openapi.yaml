
openapi: 3.0.3

info:
  title: Projeto Integrado - Baratie Fit
  description: API do Sistema de Informações Nutricionais
  version: 1.0

servers:
  - url: http://localhost:3000

paths:

  /v1/baratie/login:
    post:
      tags:
        - Autenticacao
      summary: Realiza login do administrador
      description: Permite autenticação utilizando e-mail ou nome de usuário e senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'

      responses:
        '200':
          description: Login realizado com sucesso
        '401':
          description: Credenciais inválidas
        '500':
          description: Erro interno

  /v1/baratie/recuperar-senha:
    post:
      tags:
        - Autenticacao
      summary: Solicita recuperação de senha
      description: Envia um e-mail para recuperação de senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecuperacaoSenha'

      responses:
        '200':
          description: Solicitação enviada
        '404':
          description: Usuário não encontrado

  /v1/baratie/cadastro/marmitas:
    post:
      tags:
        - Refeicao
      summary: Cadastra uma refeição
      description: Cadastro de refeições realizado por administradores

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Refeicao'

      responses:
        '201':
          description: Refeição cadastrada com sucesso
        '400':
          description: Dados inválidos
        '401':
          description: Não autorizado

    get:
      tags:
        - Refeicao
      summary: Lista todas as refeições
      description: Retorna todas as refeições cadastradas

      responses:
        '200':
          description: Operação realizada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Refeicao'

        '404':
          description: Nenhuma refeição encontrada

  /v1/baratie/marmita/{id}:
    get:
      tags:
        - Refeicao
      summary: Busca refeição por ID

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Refeição encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refeicao'

        '404':
          description: Refeição não encontrada

    put:
      tags:
        - Refeicao
      summary: Atualiza refeição

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Refeicao'

      responses:
        '200':
          description: Refeição atualizada
        '404':
          description: Refeição não encontrada

    delete:
      tags:
        - Refeicao
      summary: Remove refeição

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      responses:
        '200':
          description: Refeição removida
        '404':
          description: Refeição não encontrada

  /v1/baratie/pesquisa:
    get:
      tags:
        - Consulta
      summary: Pesquisa refeições pelo nome

      parameters:
        - name: nome
          in: query
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Pesquisa realizada com sucesso

  /v1/baratie/filtro:
    get:
      tags:
        - Consulta
      summary: Filtra refeições

      parameters:
        - name: calorias
          in: query
          schema:
            type: number

        - name: proteinas
          in: query
          schema:
            type: number

        - name: carboidratos
          in: query
          schema:
            type: number

        - name: lipideos
          in: query
          schema:
            type: number

        - name: ordem
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc

      responses:
        '200':
          description: Filtro realizado com sucesso

  /v1/baratie/restricoes:
    get:
      tags:
        - Restricao
      summary: Lista refeições por restrições alimentares

      parameters:
        - name: lactose
          in: query
          schema:
            type: boolean

        - name: gluten
          in: query
          schema:
            type: boolean

      responses:
        '200':
          description: Consulta realizada com sucesso

components:

  schemas:

    Login:
      type: object
      required:
        - usuario
        - senha

      properties:
        usuario:
          type: string

        senha:
          type: string

    RecuperacaoSenha:
      type: object

      required:
        - email

      properties:
        email:
          type: string

    RestricaoAlimentar:
      type: object

      properties:
        id:
          type: integer

        nome:
          type: string

        descricao:
          type: string

    Refeicao:
      type: object

      required:
        - nome_alimento
        - ingredientes
        - carboidratos
        - proteinas
        - lipideos

      properties:

        id:
          type: integer

        nome_alimento:
          type: string

        ingredientes:
          type: string

        possui_gluten:
          type: boolean

        possui_lactose:
          type: boolean

        carboidratos:
          type: number

        proteinas:
          type: number

        lipideos:
          type: number

        calorias:
          type: number

        restricao_alimentar:
          $ref: '#/components/schemas/RestricaoAlimentar'

