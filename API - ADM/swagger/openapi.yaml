openapi: 3.0.3

info:
title: Projeto Integrado - Baratie Fit - Administrador
description: API administrativa do Sistema de Informações Nutricionais
version: 1.0.0

servers:

* url: http://localhost:3000

paths:

/v1/baratie/login:
post:
tags:
- Autenticacao

```
  summary: Realiza login do administrador
  description: Permite autenticação utilizando e-mail ou nome de usuário e senha.

  requestBody:
    required: true

    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Login'

  responses:
    '200':
      description: Login realizado com sucesso

    '401':
      description: Credenciais inválidas

    '500':
      description: Erro interno do servidor
```

/v1/baratie/recuperar-senha:
post:
tags:
- Autenticacao

```
  summary: Solicita recuperação de senha
  description: Envia um e-mail para redefinição de senha.

  requestBody:
    required: true

    content:
      application/json:
        schema:
          $ref: '#/components/schemas/RecuperacaoSenha'

  responses:
    '200':
      description: Solicitação enviada com sucesso

    '404':
      description: Usuário não encontrado
```

/v1/baratie/marmitas:
post:
tags:
- Refeicao

```
  summary: Cadastra uma refeição
  description: Permite cadastrar uma nova refeição.

  requestBody:
    required: true

    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Refeicao'

  responses:
    '201':
      description: Refeição cadastrada com sucesso

    '400':
      description: Dados inválidos

    '401':
      description: Não autorizado

get:
  tags:
    - Refeicao

  summary: Lista todas as refeições
  description: Retorna todas as refeições cadastradas.

  responses:
    '200':
      description: Lista retornada com sucesso

      content:
        application/json:
          schema:
            type: array

            items:
              $ref: '#/components/schemas/Refeicao'

    '404':
      description: Nenhuma refeição encontrada
```

/v1/baratie/marmitas/{id}:
get:
tags:
- Refeicao

```
  summary: Busca refeição por ID

  parameters:
    - name: id
      in: path
      required: true

      schema:
        type: integer

  responses:
    '200':
      description: Refeição encontrada

      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Refeicao'

    '404':
      description: Refeição não encontrada

put:
  tags:
    - Refeicao

  summary: Atualiza refeição
  description: Atualiza os dados de uma refeição existente.

  parameters:
    - name: id
      in: path
      required: true

      schema:
        type: integer

  requestBody:
    required: true

    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Refeicao'

  responses:
    '200':
      description: Refeição atualizada com sucesso

    '400':
      description: Dados inválidos

    '404':
      description: Refeição não encontrada

delete:
  tags:
    - Refeicao

  summary: Remove refeição
  description: Exclui uma refeição do sistema.

  parameters:
    - name: id
      in: path
      required: true

      schema:
        type: integer

  responses:
    '200':
      description: Refeição removida com sucesso

    '404':
      description: Refeição não encontrada
```

components:

schemas:

```
Login:
  type: object

  required:
    - usuario
    - senha

  properties:

    usuario:
      type: string
      example: admin@baratiefit.com

    senha:
      type: string
      format: password
      example: Admin123

RecuperacaoSenha:
  type: object

  required:
    - email

  properties:

    email:
      type: string
      format: email
      example: admin@baratiefit.com

RestricaoAlimentar:
  type: object

  properties:

    id:
      type: integer
      example: 1

    nome:
      type: string
      example: Intolerância à Lactose

    descricao:
      type: string
      example: Refeição inadequada para pessoas com intolerância à lactose.

Refeicao:
  type: object

  required:
    - nome_alimento
    - ingredientes
    - carboidratos
    - proteinas
    - lipideos

  properties:

    id:
      type: integer
      example: 1

    nome_alimento:
      type: string
      example: Frango Grelhado com Arroz Integral

    ingredientes:
      type: string
      example: Frango grelhado, arroz integral, cenoura e brócolis

    possui_gluten:
      type: boolean
      example: false

    possui_lactose:
      type: boolean
      example: false

    carboidratos:
      type: number
      example: 35

    proteinas:
      type: number
      example: 42

    lipideos:
      type: number
      example: 12

    calorias:
      type: number
      example: 408

    restricao_alimentar:
      $ref: '#/components/schemas/RestricaoAlimentar'
```
